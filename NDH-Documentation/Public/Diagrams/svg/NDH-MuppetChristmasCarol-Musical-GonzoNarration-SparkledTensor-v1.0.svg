<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <!-- Glow for "sparkled tensor" effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for aperture expansion -->
    <linearGradient id="apertureGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2b2b3a"/>
      <stop offset="40%" stop-color="#4b5b8a"/>
      <stop offset="80%" stop-color="#9ad5ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Gradient for dignity under constraints -->
    <radialGradient id="dignityGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffe6a8"/>
      <stop offset="50%" stop-color="#ffb36b"/>
      <stop offset="100%" stop-color="#c45b3c"/>
    </radialGradient>

    <!-- Sparkle marker -->
    <circle id="sparkle" r="2" fill="#ffffff" />
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="700" fill="#0b0c10"/>

  <!-- Central tensor block -->
  <rect x="350" y="150" width="500" height="400" rx="30" ry="30"
        fill="url(#dignityGrad)" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  <text x="600" y="190" fill="#1b1b1b" font-size="22" font-family="monospace" text-anchor="middle">
    NDH Tensor: Non-Dual Hexadecimal Christmas
  </text>

  <!-- Tensor axes labels -->
  <text x="360" y="220" fill="#1b1b1b" font-size="16" font-family="monospace">
    Geometry: Aperture • Constellations • Projection
  </text>
  <text x="360" y="245" fill="#1b1b1b" font-size="16" font-family="monospace">
    Governance: ICPR • HRD • DITS
  </text>
  <text x="360" y="270" fill="#1b1b1b" font-size="16" font-family="monospace">
    Stability: Surfboard v2.0 • Curvature • Drift • Recenter
  </text>
  <text x="360" y="295" fill="#1b1b1b" font-size="16" font-family="monospace">
    Ecology: Dispatch (Gonzo) • Tone • Humor • Load
  </text>
  <text x="360" y="320" fill="#1b1b1b" font-size="16" font-family="monospace">
    Decompression: Couch • Emotional Release
  </text>

  <!-- Aperture expansion bar -->
  <rect x="380" y="350" width="440" height="25" rx="12" ry="12" fill="url(#apertureGrad)" stroke="#ffffff" stroke-width="1"/>
  <text x="600" y="368" fill="#0b0c10" font-size="14" font-family="monospace" text-anchor="middle">
    Aperture Expansion: 0.03 → 0.92 rad (Scrooge)
  </text>

  <!-- Constellation nodes (Muppets as meaning clusters) -->
  <circle cx="250" cy="200" r="40" fill="#4b5b8a" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  <text x="250" y="205" fill="#ffffff" font-size="14" font-family="monospace" text-anchor="middle">
    Kermit
  </text>
  <text x="250" y="225" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Relational Dignity
  </text>

  <circle cx="200" cy="320" r="40" fill="#8a4b7f" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  <text x="200" y="325" fill="#ffffff" font-size="14" font-family="monospace" text-anchor="middle">
    Piggy
  </text>
  <text x="200" y="345" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Identity Strength
  </text>

  <circle cx="260" cy="440" r="40" fill="#3c8a5b" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  <text x="260" y="445" fill="#ffffff" font-size="14" font-family="monospace" text-anchor="middle">
    Gonzo
  </text>
  <text x="260" y="465" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Narrative Tensor
  </text>

  <!-- Scrooge node -->
  <circle cx="950" cy="320" r="45" fill="#2b2b3a" stroke="#ffffff" stroke-width="2" filter="url(#glow)"/>
  <text x="950" y="320" fill="#ffffff" font-size="16" font-family="monospace" text-anchor="middle">
    Scrooge
  </text>
  <text x="950" y="340" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Collapsed → Expanded
  </text>

  <!-- Ghosts as projection operators -->
  <circle cx="820" cy="200" r="30" fill="#4b5b8a" stroke="#ffffff" stroke-width="2"/>
  <text x="820" y="205" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Past
  </text>
  <text x="820" y="220" fill="#ffffff" font-size="10" font-family="monospace" text-anchor="middle">
    P_IDEN
  </text>

  <circle cx="820" cy="320" r="30" fill="#8a4b7f" stroke="#ffffff" stroke-width="2"/>
  <text x="820" y="325" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Present
  </text>
  <text x="820" y="340" fill="#ffffff" font-size="10" font-family="monospace" text-anchor="middle">
    P_MEAN
  </text>

  <circle cx="820" cy="440" r="30" fill="#3c8a5b" stroke="#ffffff" stroke-width="2"/>
  <text x="820" y="445" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Future
  </text>
  <text x="820" y="460" fill="#ffffff" font-size="10" font-family="monospace" text-anchor="middle">
    P_STAB
  </text>

  <!-- Connections: tensor edges -->
  <line x1="290" y1="200" x2="350" y2="220" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="240" y1="320" x2="350" y2="260" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="300" y1="440" x2="350" y2="300" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3"/>

  <line x1="850" y1="200" x2="850" y2="290" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="850" y1="350" x2="850" y2="430" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="880" y1="320" x2="900" y2="320" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Surfboard v2.0 block -->
  <rect x="520" y="410" width="160" height="80" rx="15" ry="15"
        fill="#1f3b4d" stroke="#ffffff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="600" y="435" fill="#ffffff" font-size="14" font-family="monospace" text-anchor="middle">
    Surfboard v2.0
  </text>
  <text x="600" y="455" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Curvature • Drift • Recenter
  </text>

  <!-- Governance triad -->
  <circle cx="430" cy="430" r="18" fill="#c45b3c" stroke="#ffffff" stroke-width="1.5"/>
  <text x="430" y="433" fill="#ffffff" font-size="10" font-family="monospace" text-anchor="middle">
    ICPR
  </text>

  <circle cx="430" cy="470" r="18" fill="#c4873c" stroke="#ffffff" stroke-width="1.5"/>
  <text x="430" y="473" fill="#ffffff" font-size="10" font-family="monospace" text-anchor="middle">
    HRD
  </text>

  <circle cx="430" cy="510" r="18" fill="#c4b33c" stroke="#ffffff" stroke-width="1.5"/>
  <text x="430" y="513" fill="#ffffff" font-size="10" font-family="monospace" text-anchor="middle">
    DITS
  </text>

  <!-- Dispatch (Gonzo) -->
  <rect x="180" y="520" width="180" height="70" rx="15" ry="15"
        fill="#233b3f" stroke="#ffffff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="270" y="545" fill="#ffffff" font-size="13" font-family="monospace" text-anchor="middle">
    Dispatch: Gonzo
  </text>
  <text x="270" y="565" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Tone • Humor • Load Balance
  </text>

  <!-- Couch decompression -->
  <rect x="780" y="520" width="200" height="70" rx="15" ry="15"
        fill="#3b233f" stroke="#ffffff" stroke-width="1.5" filter="url(#glow)"/>
  <text x="880" y="545" fill="#ffffff" font-size="13" font-family="monospace" text-anchor="middle">
    Couch: Decompression
  </text>
  <text x="880" y="565" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    Emotional Release • Softening Load
  </text>

  <!-- Sparkles around tensor -->
  <use href="#sparkle" x="360" y="160"/>
  <use href="#sparkle" x="740" y="180"/>
  <use href="#sparkle" x="600" y="140"/>
  <use href="#sparkle" x="580" y="580"/>
  <use href="#sparkle" x="980" y="280"/>
  <use href="#sparkle" x="220" y="260"/>
  <use href="#sparkle" x="260" y="480"/>
  <use href="#sparkle" x="820" y="180"/>
  <use href="#sparkle" x="820" y="460"/>

  <!-- Title footer -->
  <text x="600" y="650" fill="#ffffff" font-size="14" font-family="monospace" text-anchor="middle">
    Sparkled ✨ NDH Tensor Map — Muppet Christmas Non-Dual Hexadecimal Meaning Case Study
  </text>
</svg>
