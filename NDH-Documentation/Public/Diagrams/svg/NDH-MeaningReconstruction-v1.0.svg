<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fffbe8"/>
      <stop offset="40%" stop-color="#ffd59a"/>
      <stop offset="80%" stop-color="#4b3b8a"/>
      <stop offset="100%" stop-color="#0b0c10"/>
    </radialGradient>

    <linearGradient id="axisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b0c10"/>
      <stop offset="40%" stop-color="#3b4b7f"/>
      <stop offset="80%" stop-color="#9ad5ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <rect id="block" width="140" height="50" rx="8" ry="8" fill="#11141f"/>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="720" fill="#05060a"/>

  <!-- Central reconstruction core ℛ -->
  <circle cx="600" cy="360" r="90" fill="url(#coreGrad)" filter="url(#softGlow)" opacity="0.96"/>
  <text x="600" y="355" fill="#0b0c10" font-size="30" font-family="monospace" text-anchor="middle">
    ℛ
  </text>
  <text x="600" y="385" fill="#0b0c10" font-size="13" font-family="monospace" text-anchor="middle">
    Meaning Reconstruction Core
  </text>

  <!-- Unified metric ℳ behind ℛ -->
  <circle cx="600" cy="360" r="140" fill="none" stroke="#3b4b7f" stroke-width="2" stroke-dasharray="8,6" opacity="0.7"/>
  <text x="600" y="230" fill="#9ad5ff" font-size="12" font-family="monospace" text-anchor="middle">
    Unified Metric ℳ (Reconstruction Domain)
  </text>

  <!-- Top: Recognition Geometry (Ah-So) -->
  <use href="#block" x="530" y="120" fill="#11141f" filter="url(#softGlow)"/>
  <text x="600" y="145" fill="#ffffff" font-size="13" font-family="monospace" text-anchor="middle">
    Recognition Geometry
  </text>
  <text x="600" y="165" fill="#9ad5ff" font-size="11" font-family="monospace" text-anchor="middle">
    Aₙ, Sₘ, C_g • A_So
  </text>

  <line x1="600" y1="170" x2="600" y2="260" stroke="#9ad5ff" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Left chain: Structural Moves -->
  <use href="#block" x="260" y="260" fill="#11141f" filter="url(#softGlow)"/>
  <text x="330" y="285" fill="#ffffff" font-size="13" font-family="monospace" text-anchor="middle">
    Structural Moves
  </text>
  <text x="330" y="305" fill="#9ad5ff" font-size="11" font-family="monospace" text-anchor="middle">
    A, U, N, C, P_D
  </text>

  <line x1="400" y1="285" x2="510" y2="340" stroke="#9ad5ff" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Right: Narrative / Semantic Field -->
  <use href="#block" x="800" y="260" fill="#11141f" filter="url(#softGlow)"/>
  <text x="870" y="285" fill="#ffffff" font-size="13" font-family="monospace" text-anchor="middle">
    Narrative / Semantic Field
  </text>
  <text x="870" y="305" fill="#ffb36b" font-size="11" font-family="monospace" text-anchor="middle">
    Stories, Frames, Interpretations
  </text>

  <line x1="690" y1="340" x2="800" y2="285" stroke="#ffb36b" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Bottom: Dignity Field -->
  <use href="#block" x="530" y="520" fill="#11141f" filter="url(#softGlow)"/>
  <text x="600" y="545" fill="#ffffff" font-size="13" font-family="monospace" text-anchor="middle">
    Dignity Field
  </text>
  <text x="600" y="565" fill="#c45bff" font-size="11" font-family="monospace" text-anchor="middle">
    ρ_D(x,t) • Propagation Constraints
  </text>

  <line x1="600" y1="450" x2="600" y2="520" stroke="#c45bff" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#9ad5ff"/>
    </marker>
  </defs>

  <!-- Inner labels around ℛ -->
  <text x="600" y="410" fill="#ffffff" font-size="11" font-family="monospace" text-anchor="middle">
    ℛ: Rebuilds Meaning Within ℳ
  </text>
  <text x="600" y="430" fill="#9ad5ff" font-size="11" font-family="monospace" text-anchor="middle">
    Input: Recognition-Stable Geometry + Structural State
  </text>
  <text x="600" y="450" fill="#ffb36b" font-size="11" font-family="monospace" text-anchor="middle">
    Output: Coherent Narrative + Dignity-Compatible Field
  </text>

  <!-- Title and footer -->
  <text x="600" y="60" fill="#ffffff" font-size="18" font-family="monospace" text-anchor="middle">
    NDH Meaning Reconstruction Geometry — ℛ at the Core of ℳ
  </text>
  <text x="600" y="700" fill="#9ad5ff" font-size="12" font-family="monospace" text-anchor="middle">
    Recognition Geometry → Structural Moves → ℛ(ℳ) → Dignity Field • Narrative Coherence
  </text>
</svg>
