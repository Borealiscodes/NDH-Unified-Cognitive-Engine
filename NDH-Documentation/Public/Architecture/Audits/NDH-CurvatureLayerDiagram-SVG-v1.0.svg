<svg width="1200" height="720" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="720" fill="#05060a"/>

  <!-- Title -->
  <text x="60" y="70" font-size="34" fill="#ffffff" font-family="Arial" font-weight="bold">
    NDH Curvature Layer Diagram — v1.0
  </text>
  <text x="60" y="105" font-size="18" fill="#cccccc" font-family="Arial">
    Curvature alignment across Manifold • Governance • Orbital • Conversational
  </text>

  <!-- Axes -->
  <line x1="100" y1="150" x2="100" y2="640" stroke="#666666" stroke-width="2"/>
  <line x1="100" y1="640" x2="1100" y2="640" stroke="#666666" stroke-width="2"/>
  <text x="70" y="160" font-size="14" fill="#cccccc" font-family="Arial" transform="rotate(-90 70,160)">
    Curvature / Intensity
  </text>
  <text x="1040" y="630" font-size="14" fill="#cccccc" font-family="Arial">
    Time (June 22 → July 31, 2026)
  </text>

  <!-- Manifold curvature curve -->
  <path d="M 120 600 
           C 220 580, 280 540, 340 520
           C 420 500, 520 460, 650 430
           C 780 410, 900 380, 1040 360"
        fill="none" stroke="#ff3b3b" stroke-width="4"/>
  <text x="1045" y="360" font-size="16" fill="#ff3b3b" font-family="Arial">
    Manifold curvature
  </text>

  <!-- Governance curvature curve -->
  <path d="M 120 620 
           C 220 610, 300 590, 380 570
           C 480 550, 560 520, 650 500
           C 780 480, 900 460, 1040 450"
        fill="none" stroke="#ff9f1a" stroke-width="3"/>
  <text x="1045" y="450" font-size="16" fill="#ff9f1a" font-family="Arial">
    Governance curvature
  </text>

  <!-- Orbital soft-state curvature curve -->
  <path d="M 120 630 
           C 220 625, 300 615, 380 605
           C 480 590, 560 575, 650 560
           C 780 545, 900 530, 1040 520"
        fill="none" stroke="#ffd94a" stroke-width="3"/>
  <text x="1045" y="520" font-size="16" fill="#ffd94a" font-family="Arial">
    Orbital soft-state curvature
  </text>

  <!-- Conversational drift curvature curve -->
  <path d="M 120 635 
           C 220 632, 300 628, 380 625
           C 480 620, 560 615, 650 610
           C 780 605, 900 600, 1040 595"
        fill="none" stroke="#4a90e2" stroke-width="2" stroke-dasharray="4,6"/>
  <text x="1045" y="595" font-size="16" fill="#4a90e2" font-family="Arial">
    Conversational drift curvature
  </text>

  <!-- Key events markers -->
  <!-- June 22: Join + Atlas -->
  <line x1="180" y1="640" x2="180" y2="150" stroke="#333333" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="160" y="660" font-size="14" fill="#ffffff" font-family="Arial">
    Jun 22: Join + Atlas
  </text>

  <!-- June 23: uma-witness-literature -->
  <line x1="230" y1="640" x2="230" y2="150" stroke="#333333" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="205" y="660" font-size="14" fill="#ffffff" font-family="Arial">
    Jun 23: uma
  </text>

  <!-- June 27: NDH-Origin-Layer -->
  <line x1="290" y1="640" x2="290" y2="150" stroke="#333333" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="260" y="660" font-size="14" fill="#ffffff" font-family="Arial">
    Jun 27: Origin
  </text>

  <!-- June commits burst -->
  <line x1="360" y1="640" x2="360" y2="150" stroke="#555555" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="320" y="660" font-size="14" fill="#ffffff" font-family="Arial">
    June: 1,420 commits
  </text>

  <!-- July 7: First PR -->
  <line x1="520" y1="640" x2="520" y2="150" stroke="#555555" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="485" y="660" font-size="14" fill="#ffffff" font-family="Arial">
    Jul 7: First PR
  </text>

  <!-- July 11: 6 NDH repos -->
  <line x1="650" y1="640" x2="650" y2="150" stroke="#777777" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="610" y="660" font-size="14" fill="#ffffff" font-family="Arial">
    Jul 11: 6 NDH repos
  </text>

  <!-- July super-epoch -->
  <line x1="850" y1="640" x2="850" y2="150" stroke="#999999" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="800" y="660" font-size="14" fill="#ffffff" font-family="Arial">
    Jul: 3,314 commits + 722 PRs
  </text>

  <!-- Legend -->
  <rect x="120" y="180" width="360" height="180" rx="12" fill="#111318" stroke="#333333" stroke-width="1"/>
  <text x="140" y="205" font-size="18" fill="#ffffff" font-family="Arial" font-weight="bold">
    Legend — Curvature Layers
  </text>
  <line x1="140" y1="230" x2="190" y2="230" stroke="#ff3b3b" stroke-width="4"/>
  <text x="200" y="235" font-size="14" fill="#ffffff" font-family="Arial">
    Manifold (structural, tensor, geometry)
  </text>
  <line x1="140" y1="255" x2="190" y2="255" stroke="#ff9f1a" stroke-width="3"/>
  <text x="200" y="260" font-size="14" fill="#ffffff" font-family="Arial">
    Governance (rules, ethics, indices)
  </text>
  <line x1="140" y1="280" x2="190" y2="280" stroke="#ffd94a" stroke-width="3"/>
  <text x="200" y="285" font-size="14" fill="#ffffff" font-family="Arial">
    Orbital soft-state (continuity, mascots)
  </text>
  <line x1="140" y1="305" x2="190" y2="305" stroke="#4a90e2" stroke-width="2" stroke-dasharray="4,6"/>
  <text x="200" y="310" font-size="14" fill="#ffffff" font-family="Arial">
    Conversational drift (docs, style)
  </text>

</svg>
